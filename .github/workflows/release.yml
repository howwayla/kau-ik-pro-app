name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bunTarget: bun-darwin-arm64
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            bunTarget: bun-darwin-x64
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bunTarget: bun-linux-x64
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bunTarget: bun-windows-x64
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Compile the bundled Node server into a single-file sidecar binary
      # (replaces the former upstream shioaji sidecar download).
      - name: Build nova-server sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          EXT=""
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then EXT=".exe"; fi
          bun build server/src/index.ts --compile --target ${{ matrix.bunTarget }} \
            --outfile "src-tauri/binaries/nova-server-${{ matrix.target }}$EXT"

      # Tauri treats a present-but-empty APPLE_ID as "please notarize", so the
      # notarization env is only injected when real credentials exist.
      - name: Enable notarization (when credentials are configured)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_ID }}" ] && [ -n "${{ secrets.APPLE_PASSWORD }}" ]; then
            {
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
            echo "Notarization enabled"
          else
            echo "Notarization credentials not set — signing only"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing (notarization env is injected by the step
          # above only when credentials are configured)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nova Pro ${{ github.ref_name }}'
          releaseBody: |
            Nova Pro 桌面版 — 內建 Node server（sidecar，開啟即自動啟動）、
            多券商交易（富邦／台新／玉山）、系統匣（menu bar）。
            下載對應平台的安裝檔即可使用。

            macOS: .dmg ｜ Windows: .msi / .exe ｜ Linux: .AppImage / .deb / .rpm
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
